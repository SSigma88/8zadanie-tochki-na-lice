<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Импорт библиотек через CDN -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-three.prod.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
    <style>
      body { margin: 0; overflow: hidden; }
      #container { width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <script type="module">
      import * as THREE from 'three';
      import { MindARThree } from 'mindar-face-three';

      const mindarThree = new MindARThree({
        container: document.querySelector("#container"),
      });

      const {renderer, scene, camera} = mindarThree;

      // Создаем якорь для лица (Face Mesh)
      const anchor = mindarThree.addAnchor(1);

      // Геометрия и материал для синих сфер
      const sphereGeometry = new THREE.SphereGeometry(0.008, 8, 8);
      const sphereMaterial = new THREE.MeshBasicMaterial({color: 0x0000ff});

      const spheres = [];
      // Создаем 468 сфер (согласно количеству точек в MediaPipe Face Mesh)
      for (let i = 0; i < 468; i++) {
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        spheres.push(sphere);
        anchor.group.add(sphere);
      }

      // Обновляем позиции сфер на каждом кадре
      mindarThree.addFaceMeshUpdateCallback((faceMesh) => {
        for (let i = 0; i < 468; i++) {
          const point = faceMesh.keypoints[i];
          // Устанавливаем координаты сферы согласно координатам точки лица
          spheres[i].position.set(point.x, point.y, point.z);
        }
      });

      const start = async() => {
        await mindarThree.start();
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
        });
      }
      
      start();
    </script>
  </body>
</html>
