<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Mesh 468 Dots</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #videoElement { display: none; }
        #outputCanvas {
            max-width: 100%;
            max-height: 100%;
            transform: scaleX(-1); /* Зеркальное отображение для удобства */
        }
    </style>
</head>
<body>
    <video id="videoElement" autoplay muted playsinline></video>
    <canvas id="outputCanvas"></canvas>

    <!-- Используем более стабильные версии скриптов -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');

        const faceMesh = new FaceMesh({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
            }
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // Включает дополнительные точки вокруг глаз и губ (итого 478)
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);

        function onResults(results) {
            // Устанавливаем размеры холста под видеопоток
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Рисуем кадр видео
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks) {
                for (const landmarks of results.multiFaceLandmarks) {
                    // Рисуем каждую из 468+ точек
                    for (let i = 0; i < landmarks.length; i++) {
                        const x = landmarks[i].x * canvasElement.width;
                        const y = landmarks[i].y * canvasElement.height;
                        
                        canvasCtx.beginPath();
                        canvasCtx.arc(x, y, 1.5, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = '#00BFFF'; // Глубокий небесно-синий
                        canvasCtx.fill();
                        
                        // Небольшой эффект свечения (опционально)
                        canvasCtx.shadowBlur = 2;
                        canvasCtx.shadowColor = '#00BFFF';
                    }
                }
            }
            canvasCtx.restore();
        }

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        
        camera.start();
    </script>
</body>
</html>
